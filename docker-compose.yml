version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mulenet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mulenet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mulenet-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: mulenet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: mulenet-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  neo4j:
    image: neo4j:5.12-community
    container_name: mulenet-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/passwordpassword
    volumes:
      - neo4j_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: mulenet-keycloak
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin

  backend:
    build: ./backend
    container_name: mulenet-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mulenet
      - DB_USER=postgres
      - DB_PASS=postgres
      - OAUTH2_ENABLED=false
      - ML_SERVICE_URL=http://ml_service:8000
    depends_on:
      - postgres
      - kafka

  ml_service:
    build: ./ml_service
    container_name: mulenet-ml-service
    ports:
      - "8000:8000"
    environment:
      - BACKEND_API_URL=http://backend:8080
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=passwordpassword
    depends_on:
      - redis
      - neo4j
      - kafka

  celery_worker:
    build: ./ml_service
    container_name: mulenet-celery-worker
    command: celery -A celery_app.celery worker --loglevel=info
    environment:
      - BACKEND_API_URL=http://backend:8080
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=passwordpassword
    depends_on:
      - redis
      - ml_service

  frontend:
    build: ./frontend
    container_name: mulenet-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ml_service

volumes:
  postgres_data:
  neo4j_data:
