spring.application.name=api

# Database connection (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mulenet}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server port
server.port=8080

# Jackson Serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# Security
app.security.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS0yNTYtYml0LXNpZ25pbmcta2V5LWZvci1tdWxlbmV0LWFwaS1wbGF0Zm9ybQ==}

# OAuth2 Resource Server Configuration (Keycloak)
app.security.oauth2.enabled=${OAUTH2_ENABLED:false}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081/realms/mulenet}

